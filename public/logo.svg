<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
  <!-- Dark background for visibility (remove for production use) -->
  <rect width="200" height="100" fill="#010208"/>

  <!-- Moon (left) — crescent facing right -->
  <path d="M55 15 A40 40 0 1 0 55 85 A28 28 0 1 1 55 15Z"
        fill="white"/>

  <!-- Sun (right) — circle with rays -->
  <circle cx="130" cy="50" r="22" fill="white"/>

  <!-- Sun rays -->
  <g stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="130" y1="18" x2="130" y2="10"/>
    <line x1="130" y1="82" x2="130" y2="90"/>
    <line x1="162" y1="50" x2="170" y2="50"/>
    <line x1="152" y1="27" x2="158" y2="21"/>
    <line x1="152" y1="73" x2="158" y2="79"/>
    <line x1="108" y1="27" x2="102" y2="21"/>
    <line x1="108" y1="73" x2="102" y2="79"/>
  </g>

  <!-- Eye (centered between moon and sun) -->
  <g transform="translate(95,50)">
    <path d="M-22 0 C-12 -14 12 -14 22 0 C12 14 -12 14 -22 0Z"
          stroke="white" stroke-width="2.5" fill="none"/>
    <circle cx="0" cy="0" r="7" stroke="white" stroke-width="2.5" fill="none"/>
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>

  <!-- Connection arcs — linking moon to sun through the eye -->
  <path d="M58 50 Q95 35 130 50" stroke="white" stroke-width="1.2" opacity="0.3" fill="none"/>
  <path d="M58 50 Q95 65 130 50" stroke="white" stroke-width="1.2" opacity="0.3" fill="none"/>
</svg>
